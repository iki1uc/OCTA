<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>OCTA · WHIRL · GEO · 81</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#geo {
    width: 360px;
    height: 360px;
    margin: 40px auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 14s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #6cf;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>OCTA · WHIRL · GEO‑Vektor</h1>

<div id="geo"></div>

<pre id="info">Lade WHIRL.json…</pre>

<script>
(async function(){

    const info = document.getElementById("info");

    try {
        const whirl = await fetch("WHIRL.json").then(r => r.json());

        info.innerText =
            "WHIRL geladen ✓\n" +
            "Vektor: " + whirl.vector + "\n" +
            "Felder: " + whirl.fields + "\n" +
            "Geo: " + whirl.geo + "\n" +
            "Module: " + whirl.routes.length + "\n";

        // Geometrie erzeugen
        const geo = document.getElementById("geo");
        const count = whirl.fields;
        const radius = 160;

        for(let i=0; i<count; i++){
            const dot = document.createElement("div");
            dot.className = "dot";

            const angle = (i / count) * Math.PI * 2;
            const x = Math.cos(angle) * radius + 180 - 5;
            const y = Math.sin(angle) * radius + 180 - 5;

            dot.style.left = x + "px";
            dot.style.top = y + "px";

            geo.appendChild(dot);
        }

    } catch(e){
        info.innerText = "WHIRL → Fehler\n" + e.toString();
    }

})();
</script>

</body>
</html>
