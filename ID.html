<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ID · WHIRL · GEO · 81</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#geo {
    width: 360px;
    height: 360px;
    margin: 40px auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 12s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}
</style>
</head>

<body>

<h1>ID · WHIRL · GEO‑Vektor</h1>

<div id="geo"></div>

<script>
const geo = document.getElementById("geo");
const count = 81;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 180 - 5;
    const y = Math.sin(angle) * radius + 180 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}
</script>

</body>
</html>
